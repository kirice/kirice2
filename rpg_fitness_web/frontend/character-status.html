<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Status Screen - Vintage RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #e3d5ca;
            --paper-dark: #d2b48c;
            --ink-color: #1a1a1a;
            --accent-red: #8b1a1a;
            --accent-gold: #b8860b;
        }
        
        * { 
            font-family: 'Courier Prime', monospace;
        }
        
        .vintage-paper {
            background-color: var(--paper-bg);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"),
                radial-gradient(ellipse at center, transparent 0%, rgba(139, 69, 19, 0.1) 100%);
            position: relative;
        }
        
        .vintage-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .ink-text {
            color: var(--ink-color);
            text-shadow: 0 0 1px rgba(26, 26, 26, 0.3);
        }
        
        .ink-border {
            border-color: var(--ink-color);
        }
        
        .cinzel-font {
            font-family: 'Cinzel', serif;
        }
        
        /* SVG Ink Animation */
        .ink-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawInk 2s ease-out forwards;
        }
        
        @keyframes drawInk {
            to {
                stroke-dashoffset: 0;
            }
        }
        
        /* Connection Lines */
        .connection-line-track {
            stroke: rgba(26, 26, 26, 0.3);
            stroke-width: 2;
        }
        
        .connection-line-fill {
            stroke: var(--accent-red);
            stroke-width: 2;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            transition: stroke-dashoffset 0.5s ease-out;
        }
        
        .connection-line-fill.active {
            stroke-dashoffset: 0;
        }
        
        /* Body Part Hover Effects */
        .body-part {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .body-part:hover {
            filter: drop-shadow(0 0 8px rgba(139, 26, 26, 0.5));
        }
        
        .body-part:hover .body-outline {
            stroke: var(--accent-red);
            stroke-width: 4px;
        }
        
        .body-outline {
            transition: all 0.3s ease;
        }
        
        /* Tooltip Styles */
        .vintage-tooltip {
            background: var(--paper-dark);
            border: 2px solid var(--ink-color);
            box-shadow: 
                0 4px 8px rgba(26, 26, 26, 0.3),
                inset 0 0 20px rgba(139, 69, 19, 0.1);
            padding: 12px 16px;
            position: absolute;
            z-index: 50;
            min-width: 180px;
        }
        
        .vintage-tooltip::after {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: var(--ink-color);
        }
        
        /* Progress Bar Vintage Style */
        .vintage-progress {
            background: repeating-linear-gradient(
                90deg,
                var(--ink-color) 0px,
                var(--ink-color) 1px,
                transparent 1px,
                transparent 10px
            );
            border: 2px solid var(--ink-color);
            height: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .vintage-progress-fill {
            background: var(--accent-red);
            height: 100%;
            transition: width 0.5s ease-out;
            position: relative;
        }
        
        .vintage-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 4px,
                rgba(26, 26, 26, 0.2) 4px,
                rgba(26, 26, 26, 0.2) 5px
            );
        }
        
        /* XP Gold Text */
        .xp-gold {
            color: var(--accent-gold);
            text-shadow: 0 0 2px rgba(184, 134, 11, 0.5);
        }
        
        /* Ornamental Divider */
        .ornament-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0;
        }
        
        .ornament-divider::before,
        .ornament-divider::after {
            content: '❧';
            color: var(--ink-color);
            font-size: 20px;
            margin: 0 10px;
        }
        
        .ornament-divider span {
            color: var(--ink-color);
            font-size: 16px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .connection-lines {
                display: none;
            }
            
            .stats-panel {
                order: 2;
            }
            
            .character-display {
                order: 1;
            }
        }
    </style>
</head>
<body class="vintage-paper min-h-screen">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Данные характеристик персонажа
        const characterStats = {
            head: { name: 'Голова', level: 5, xp: 1200, nextXp: 2000, icon: '🧠' },
            arms: { name: 'Руки', level: 7, xp: 2800, nextXp: 3500, icon: '💪' },
            torso: { name: 'Туловище', level: 6, xp: 1800, nextXp: 2500, icon: '🛡️' },
            legs: { name: 'Ноги', level: 4, xp: 900, nextXp: 1500, icon: '🦵' }
        };
        
        // Компонент прогресс-бара в винтажном стиле
        const VintageProgressBar = ({ current, max, color = '#8b1a1a' }) => {
            const percent = Math.min((current / max) * 100, 100);
            return (
                <div className="vintage-progress w-full my-2">
                    <div 
                        className="vintage-progress-fill"
                        style={{ width: `${percent}%`, backgroundColor: color }}
                    />
                </div>
            );
        };
        
        // Компонент всплывающей подсказки
        const VintageTooltip = ({ stat, position }) => {
            if (!stat) return null;
            
            const xpPercent = ((stat.xp - (stat.nextXp / 5 * 4)) / (stat.nextXp / 5)) * 100;
            
            return (
                <div 
                    className="vintage-tooltip ink-text"
                    style={{ 
                        left: position.x + 20,
                        top: position.y - 60
                    }}
                >
                    <h4 className="cinzel-font font-bold text-lg mb-2">{stat.name}</h4>
                    <div className="text-sm mb-1">
                        <span className="font-bold">Уровень {stat.level}</span>
                        <span className="xp-gold ml-2">({stat.xp} XP)</span>
                    </div>
                    <VintageProgressBar 
                        current={stat.xp % (stat.nextXp / 5 * 4)} 
                        max={stat.nextXp / 5}
                    />
                    <div className="text-xs mt-1 opacity-70">
                        До следующего уровня: {stat.nextXp - stat.xp} XP
                    </div>
                </div>
            );
        };
        
        // SVG иконка человечка для линий
        const TinyPersonIcon = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#1a1a1a">
                <circle cx="12" cy="8" r="4"/>
                <path d="M12 14c-4 0-8 2-8 6v2h16v-2c0-4-4-6-8-6z"/>
            </svg>
        );
        
        // Основной компонент экрана статуса персонажа
        const CharacterStatusScreen = () => {
            const [hoveredPart, setHoveredPart] = useState(null);
            const [tooltipPosition, setTooltipPosition] = useState({ x: 0, y: 0 });
            const svgRef = useRef(null);
            
            const handleMouseEnter = (part, e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                setTooltipPosition({
                    x: rect.right,
                    y: rect.top + rect.height / 2
                });
                setHoveredPart(part);
            };
            
            const handleMouseLeave = () => {
                setHoveredPart(null);
            };
            
            // Координаты точек соединения для линий
            const connectionPoints = {
                head: { start: { x: 280, y: 80 }, end: { x: 420, y: 100 } },
                arms: { start: { x: 200, y: 180 }, end: { x: 420, y: 200 } },
                torso: { start: { x: 250, y: 220 }, end: { x: 420, y: 240 } },
                legs: { start: { x: 250, y: 380 }, end: { x: 420, y: 320 } }
            };
            
            return (
                <div className="min-h-screen p-8">
                    {/* Заголовок */}
                    <header className="text-center mb-8">
                        <h1 className="cinzel-font text-4xl font-bold ink-text mb-2">
                            ✦ Статус Персонажа ✦
                        </h1>
                        <div className="ornament-divider">
                            <span>⚜</span>
                        </div>
                    </header>
                    
                    {/* Основной контейнер */}
                    <div className="flex flex-col lg:flex-row gap-8 items-center justify-center max-w-6xl mx-auto">
                        
                        {/* Левая зона: Силуэт человека */}
                        <div className="character-display relative">
                            <svg 
                                ref={svgRef}
                                width="400" 
                                height="500" 
                                viewBox="0 0 400 500"
                                className="drop-shadow-lg"
                            >
                                {/* Декоративная рамка вокруг силуэта */}
                                <rect 
                                    x="50" y="20" width="300" height="460" 
                                    fill="none" 
                                    stroke="#1a1a1a" 
                                    strokeWidth="2"
                                    opacity="0.3"
                                />
                                
                                {/* Силуэт человека - анатомический рисунок */}
                                {/* Голова */}
                                <g 
                                    className="body-part"
                                    onMouseEnter={(e) => handleMouseEnter('head', e)}
                                    onMouseLeave={handleMouseLeave}
                                >
                                    <ellipse 
                                        className="body-outline"
                                        cx="200" cy="80" rx="35" ry="45" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                    />
                                    {/* Детали лица (схематично) */}
                                    <line x1="185" y1="75" x2="195" y2="75" stroke="#1a1a1a" strokeWidth="1.5"/>
                                    <line x1="205" y1="75" x2="215" y2="75" stroke="#1a1a1a" strokeWidth="1.5"/>
                                    <path d="M 195 95 Q 200 100 205 95" fill="none" stroke="#1a1a1a" strokeWidth="1.5"/>
                                </g>
                                
                                {/* Туловище */}
                                <g 
                                    className="body-part"
                                    onMouseEnter={(e) => handleMouseEnter('torso', e)}
                                    onMouseLeave={handleMouseLeave}
                                >
                                    <path 
                                        className="body-outline"
                                        d="M 165 130 L 235 130 L 245 280 L 155 280 Z" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                    {/* Грудная клетка (схематично) */}
                                    <ellipse cx="200" cy="180" rx="30" ry="40" fill="none" stroke="#1a1a1a" strokeWidth="1" opacity="0.5"/>
                                </g>
                                
                                {/* Руки */}
                                <g 
                                    className="body-part"
                                    onMouseEnter={(e) => handleMouseEnter('arms', e)}
                                    onMouseLeave={handleMouseLeave}
                                >
                                    {/* Левая рука */}
                                    <path 
                                        className="body-outline"
                                        d="M 165 140 Q 120 160 110 220 L 105 280" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                    />
                                    {/* Правая рука */}
                                    <path 
                                        className="body-outline"
                                        d="M 235 140 Q 280 160 290 220 L 295 280" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                    />
                                </g>
                                
                                {/* Ноги */}
                                <g 
                                    className="body-part"
                                    onMouseEnter={(e) => handleMouseEnter('legs', e)}
                                    onMouseLeave={handleMouseLeave}
                                >
                                    {/* Левая нога */}
                                    <path 
                                        className="body-outline"
                                        d="M 175 280 L 175 380 L 170 450" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                    />
                                    {/* Правая нога */}
                                    <path 
                                        className="body-outline"
                                        d="M 225 280 L 225 380 L 230 450" 
                                        fill="none" 
                                        stroke="#1a1a1a" 
                                        strokeWidth="3"
                                        strokeLinecap="round"
                                    />
                                </g>
                                
                                {/* Соединительные линии (двойные) */}
                                <g className="connection-lines">
                                    {/* Линия от головы */}
                                    <line 
                                        className="connection-line-track"
                                        x1={connectionPoints.head.start.x} 
                                        y1={connectionPoints.head.start.y} 
                                        x2={connectionPoints.head.end.x} 
                                        y2={connectionPoints.head.end.y}
                                    />
                                    <line 
                                        className={`connection-line-fill ${hoveredPart === 'head' ? 'active' : ''}`}
                                        x1={connectionPoints.head.start.x} 
                                        y1={connectionPoints.head.start.y - 4} 
                                        x2={connectionPoints.head.end.x} 
                                        y2={connectionPoints.head.end.y - 4}
                                        style={{ strokeDashoffset: 100 - (characterStats.head.xp / characterStats.head.nextXp) * 100 }}
                                    />
                                    
                                    {/* Линия от рук */}
                                    <line 
                                        className="connection-line-track"
                                        x1={connectionPoints.arms.start.x} 
                                        y1={connectionPoints.arms.start.y} 
                                        x2={connectionPoints.arms.end.x} 
                                        y2={connectionPoints.arms.end.y}
                                    />
                                    <line 
                                        className={`connection-line-fill ${hoveredPart === 'arms' ? 'active' : ''}`}
                                        x1={connectionPoints.arms.start.x} 
                                        y1={connectionPoints.arms.start.y - 4} 
                                        x2={connectionPoints.arms.end.x} 
                                        y2={connectionPoints.arms.end.y - 4}
                                        style={{ strokeDashoffset: 100 - (characterStats.arms.xp / characterStats.arms.nextXp) * 100 }}
                                    />
                                    
                                    {/* Линия от туловища */}
                                    <line 
                                        className="connection-line-track"
                                        x1={connectionPoints.torso.start.x} 
                                        y1={connectionPoints.torso.start.y} 
                                        x2={connectionPoints.torso.end.x} 
                                        y2={connectionPoints.torso.end.y}
                                    />
                                    <line 
                                        className={`connection-line-fill ${hoveredPart === 'torso' ? 'active' : ''}`}
                                        x1={connectionPoints.torso.start.x} 
                                        y1={connectionPoints.torso.start.y - 4} 
                                        x2={connectionPoints.torso.end.x} 
                                        y2={connectionPoints.torso.end.y - 4}
                                        style={{ strokeDashoffset: 100 - (characterStats.torso.xp / characterStats.torso.nextXp) * 100 }}
                                    />
                                    
                                    {/* Линия от ног */}
                                    <line 
                                        className="connection-line-track"
                                        x1={connectionPoints.legs.start.x} 
                                        y1={connectionPoints.legs.start.y} 
                                        x2={connectionPoints.legs.end.x} 
                                        y2={connectionPoints.legs.end.y}
                                    />
                                    <line 
                                        className={`connection-line-fill ${hoveredPart === 'legs' ? 'active' : ''}`}
                                        x1={connectionPoints.legs.start.x} 
                                        y1={connectionPoints.legs.start.y - 4} 
                                        x2={connectionPoints.legs.end.x} 
                                        y2={connectionPoints.legs.end.y - 4}
                                        style={{ strokeDashoffset: 100 - (characterStats.legs.xp / characterStats.legs.nextXp) * 100 }}
                                    />
                                </g>
                            </svg>
                            
                            {/* Всплывающая подсказка */}
                            {hoveredPart && (
                                <VintageTooltip 
                                    stat={characterStats[hoveredPart]} 
                                    position={tooltipPosition}
                                />
                            )}
                        </div>
                        
                        {/* Правая зона: Меню характеристик */}
                        <div className="stats-panel w-full max-w-md">
                            <div className="border-2 border-[#1a1a1a] p-6 relative bg-[#d2b48c]/50">
                                {/* Декоративные уголки */}
                                <div className="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-[#1a1a1a]"/>
                                <div className="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-[#1a1a1a]"/>
                                <div className="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-[#1a1a1a]"/>
                                <div className="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-[#1a1a1a]"/>
                                
                                <h2 className="cinzel-font text-2xl font-bold ink-text text-center mb-6">
                                    ⚜ Характеристики ⚜
                                </h2>
                                
                                {/* Список характеристик */}
                                <div className="space-y-4">
                                    {Object.entries(characterStats).map(([key, stat]) => (
                                        <div 
                                            key={key}
                                            className={`p-4 border ink-border transition-all cursor-pointer ${
                                                hoveredPart === key ? 'bg-[#8b1a1a]/10' : 'bg-transparent'
                                            }`}
                                            onMouseEnter={() => setHoveredPart(key)}
                                            onMouseLeave={() => setHoveredPart(null)}
                                        >
                                            <div className="flex items-center justify-between mb-2">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-xl">{stat.icon}</span>
                                                    <span className="cinzel-font font-bold ink-text text-lg">
                                                        {stat.name}
                                                    </span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <TinyPersonIcon />
                                                    <span className="font-bold ink-text">Lvl {stat.level}</span>
                                                </div>
                                            </div>
                                            
                                            {/* XP прогресс */}
                                            <div className="flex items-center gap-2 text-sm mb-1">
                                                <span className="xp-gold font-bold">✦ {stat.xp} XP</span>
                                                <span className="opacity-60">/ {stat.nextXp}</span>
                                            </div>
                                            
                                            <VintageProgressBar 
                                                current={stat.xp} 
                                                max={stat.nextXp}
                                                color="#8b1a1a"
                                            />
                                            
                                            {/* Дополнительная информация */}
                                            <div className="text-xs opacity-60 mt-1 text-right">
                                                Осталось: {stat.nextXp - stat.xp} XP
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                {/* Разделитель */}
                                <div className="ornament-divider my-6">
                                    <span>◆</span>
                                </div>
                                
                                {/* Общий уровень */}
                                <div className="text-center">
                                    <p className="cinzel-font text-sm opacity-70 mb-2">Общий Уровень Персонажа</p>
                                    <p className="cinzel-font text-4xl font-bold xp-gold">22</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Футер с декоративным элементом */}
                    <footer className="text-center mt-12 opacity-60">
                        <div className="ornament-divider">
                            <span>❧</span>
                        </div>
                        <p className="text-sm cinzel-font">Слава и Честь, Путник</p>
                    </footer>
                </div>
            );
        };
        
        // Рендеринг приложения
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CharacterStatusScreen />);
    </script>
</body>
</html>
