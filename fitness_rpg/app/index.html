<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness RPG - Character Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="parchment-bg"></div>
    
    <div class="container">
        <!-- Левая панель: Силуэт человека -->
        <div class="left-panel">
            <h1 class="main-title">Character Status</h1>
            
            <div class="character-container">
                <svg class="character-svg" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
                    <!-- Голова -->
                    <g id="zone-head" class="zone-zone" data-zone="neck">
                        <ellipse cx="200" cy="80" rx="35" ry="40" 
                                 class="zone-path" 
                                 fill="transparent" 
                                 stroke="#1a1a1a" 
                                 stroke-width="2"/>
                        <circle cx="200" cy="80" r="30" 
                                class="zone-highlight"
                                fill="rgba(139, 26, 26, 0.1)"/>
                    </g>
                    
                    <!-- Туловище (Chest + Back) -->
                    <g id="zone-torso" class="zone-zone" data-zone="chest">
                        <path d="M165 120 L235 120 L245 220 L230 280 L170 280 L155 220 Z" 
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <rect x="165" y="125" width="70" height="150" 
                              class="zone-highlight"
                              fill="rgba(139, 26, 26, 0.1)"/>
                    </g>
                    
                    <!-- Спина (задняя часть, показана пунктиром) -->
                    <g id="zone-back" class="zone-zone" data-zone="back">
                        <path d="M160 125 Q200 150 240 125" 
                              fill="none" 
                              stroke="#1a1a1a" 
                              stroke-width="1.5"
                              stroke-dasharray="5,5"/>
                    </g>
                    
                    <!-- Левая рука -->
                    <g id="zone-l-arm" class="zone-zone" data-zone="arms">
                        <path d="M165 130 L130 150 L120 220 L125 230 L140 225 L150 155 L165 145 Z" 
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <line x1="165" y1="135" x2="135" y2="155" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                        <line x1="135" y1="155" x2="128" y2="220" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                    </g>
                    
                    <!-- Правая рука -->
                    <g id="zone-r-arm" class="zone-zone" data-zone="arms">
                        <path d="M235 130 L270 150 L280 220 L275 230 L260 225 L250 155 L235 145 Z" 
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <line x1="235" y1="135" x2="265" y2="155" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                        <line x1="265" y1="155" x2="272" y2="220" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                    </g>
                    
                    <!-- Core (пресс) -->
                    <g id="zone-core" class="zone-zone" data-zone="core">
                        <rect x="175" y="200" width="50" height="70" rx="5"
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <line x1="200" y1="205" x2="200" y2="265" 
                              stroke="#1a1a1a" 
                              stroke-width="1" 
                              stroke-dasharray="3,3"/>
                    </g>
                    
                    <!-- Ноги -->
                    <g id="zone-legs" class="zone-zone" data-zone="legs">
                        <!-- Левая нога -->
                        <path d="M170 280 L165 350 L160 420 L170 430 L185 420 L190 350 L195 280 Z" 
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <line x1="175" y1="285" x2="172" y2="345" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                        <line x1="172" y1="345" x2="170" y2="415" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                        
                        <!-- Правая нога -->
                        <path d="M230 280 L235 350 L240 420 L230 430 L215 420 L210 350 L205 280 Z" 
                              class="zone-path"
                              fill="transparent" 
                              stroke="#1a1a1a" 
                              stroke-width="2"/>
                        <line x1="225" y1="285" x2="228" y2="345" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                        <line x1="228" y1="345" x2="230" y2="415" 
                              stroke="#1a1a1a" 
                              stroke-width="1"/>
                    </g>
                    
                    <!-- Grip (кисти) -->
                    <g id="zone-grip" class="zone-zone" data-zone="grip">
                        <ellipse cx="122" cy="235" rx="8" ry="10" 
                                 fill="transparent" 
                                 stroke="#1a1a1a" 
                                 stroke-width="1.5"/>
                        <ellipse cx="278" cy="235" rx="8" ry="10" 
                                 fill="transparent" 
                                 stroke="#1a1a1a" 
                                 stroke-width="1.5"/>
                    </g>
                    
                    <!-- Cardio (сердце) -->
                    <g id="zone-cardio" class="zone-zone" data-zone="cardio">
                        <path d="M190 160 Q195 150 200 160 Q205 150 210 160 Q210 175 200 185 Q190 175 190 160" 
                              fill="rgba(139, 26, 26, 0.2)" 
                              stroke="#8b1a1a" 
                              stroke-width="1.5"/>
                    </g>
                    
                    <!-- Flexibility/Mobility (позвоночник) -->
                    <g id="zone-flexibility" class="zone-zone" data-zone="flexibility">
                        <path d="M200 100 Q200 150 200 200" 
                              fill="none" 
                              stroke="#1a1a1a" 
                              stroke-width="2" 
                              stroke-linecap="round"/>
                        <circle cx="200" cy="120" r="3" fill="#1a1a1a"/>
                        <circle cx="200" cy="150" r="3" fill="#1a1a1a"/>
                        <circle cx="200" cy="180" r="3" fill="#1a1a1a"/>
                    </g>
                    
                    <g id="zone-mobility" class="zone-zone" data-zone="mobility">
                        <circle cx="180" cy="280" r="10" 
                                fill="transparent" 
                                stroke="#1a1a1a" 
                                stroke-width="1.5"/>
                        <circle cx="220" cy="280" r="10" 
                                fill="transparent" 
                                stroke="#1a1a1a" 
                                stroke-width="1.5"/>
                    </g>
                </svg>
                
                <!-- SVG для соединительных линий -->
                <svg class="lines-svg" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="inkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Линии будут добавлены динамически через JS -->
                    <g id="connection-lines"></g>
                </svg>
            </div>
            
            <div class="overall-stats" id="overall-stats">
                <div class="stat-item">
                    <span class="stat-label">Overall Level</span>
                    <span class="stat-value" id="overall-level">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total XP</span>
                    <span class="stat-value" id="total-xp">0</span>
                </div>
            </div>
        </div>
        
        <!-- Правая панель: Характеристики -->
        <div class="right-panel" id="right-panel">
            <div class="panel-header">
                <h2 class="panel-title">Characteristics</h2>
                <div class="user-info">
                    <span class="username" id="username">Adventurer</span>
                </div>
            </div>
            
            <div class="zone-details" id="zone-details">
                <div class="empty-state">
                    <p>Select a body zone to view details</p>
                    <svg class="icon-man" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="5" r="3"/>
                        <path d="M12 8v8"/>
                        <path d="M9 12h6"/>
                        <path d="M12 16v6"/>
                        <path d="M9 22h6"/>
                    </svg>
                </div>
            </div>
            
            <div class="exercise-list" id="exercise-list">
                <h3 class="section-title">Available Exercises</h3>
                <div class="exercise-items" id="exercise-items">
                    <!-- Упражнения будут загружены через JS -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-content">
            <div class="tooltip-header">
                <span class="tooltip-zone-name" id="tooltip-zone-name">Zone Name</span>
                <span class="tooltip-level" id="tooltip-level">Level 5</span>
            </div>
            <div class="tooltip-xp">
                <span id="tooltip-xp-text">1200 / 1360 XP</span>
            </div>
            <div class="tooltip-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="tooltip-progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="tooltip-decay" id="tooltip-decay">
                <!-- Информация о декременте -->
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
